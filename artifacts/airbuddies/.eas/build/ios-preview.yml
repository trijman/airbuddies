build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: |
          echo "=== PWD: $PWD ==="
          # After checkout, cwd is artifacts/airbuddies; lockfile is at monorepo root (../../)
          rm -f ../../pnpm-lock.yaml && echo "Deleted ../../pnpm-lock.yaml" || echo "No lockfile found at ../../"
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: |
          # cwd is already artifacts/airbuddies — expo prebuild generates ios/ and installs pods
          pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          # Expo prebuild may have modified package.json — resync lockfile
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - eas/run_fastlane
