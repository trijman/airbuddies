build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: rm -f ../../pnpm-lock.yaml && echo "Deleted" || true
    - run:
        name: Strip expo-dev-client (not needed for distribution builds)
        command: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.dependencies['expo-dev-client'];fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('expo-dev-client removed');"
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Patch pbxproj and create Fastfile
        command: |
          PBXPROJ="ios/Airbuddies.xcodeproj/project.pbxproj"
          echo "=== Bundle IDs ==="
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ" | sort -u
          echo "=== Signing before ==="
          grep "CODE_SIGN_STYLE" "$PBXPROJ" | head -5
          python3 -c "f='ios/Airbuddies.xcodeproj/project.pbxproj';c=open(f).read();cnt=c.count('CODE_SIGN_STYLE = Manual');open(f,'w').write(c.replace('CODE_SIGN_STYLE = Manual','CODE_SIGN_STYLE = Automatic'));print('Replaced',cnt,'occurrences')"
          echo "=== Signing after ==="
          grep "CODE_SIGN_STYLE" "$PBXPROJ" | head -5
          mkdir -p ios/fastlane
          cat > ios/fastlane/Fastfile << 'FASTFILE_EOF'
default_platform(:ios)

platform :ios do
  lane :build do
    gym(
      scheme: "Airbuddies",
      project: "./Airbuddies.xcodeproj",
      configuration: "Release",
      output_directory: ".",
      output_name: "Airbuddies",
      export_method: "ad-hoc",
      xcargs: "-allowProvisioningUpdates"
    )
  end
end
FASTFILE_EOF
          echo "=== Fastfile created ==="
          cat ios/fastlane/Fastfile
    - eas/run_fastlane
