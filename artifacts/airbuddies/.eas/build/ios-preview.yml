build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: rm -f ../../pnpm-lock.yaml && echo "Deleted" || true
    - run:
        name: Strip expo-dev-client (not needed for distribution builds)
        command: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const removed = [];
            ['expo-dev-client'].forEach(dep => {
              if (pkg.dependencies && pkg.dependencies[dep]) {
                delete pkg.dependencies[dep];
                removed.push(dep);
              }
            });
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Removed from dependencies:', removed.join(', ') || 'none');
          "
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Patch pbxproj - enable Automatic signing
        command: |
          PBXPROJ="ios/Airbuddies.xcodeproj/project.pbxproj"
          echo "=== BEFORE PATCH ==="
          grep -n "CODE_SIGN_STYLE" "$PBXPROJ" || echo "(not found)"
          echo "--- Bundle IDs in project ---"
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ" | sort -u
          python3 - "$PBXPROJ" <<'PYEOF'
          import sys
          path = sys.argv[1]
          with open(path, 'r') as f:
              c = f.read()
          count = c.count('CODE_SIGN_STYLE = Manual')
          new_c = c.replace('CODE_SIGN_STYLE = Manual', 'CODE_SIGN_STYLE = Automatic')
          with open(path, 'w') as f:
              f.write(new_c)
          print(f"Replaced {count} occurrence(s) of CODE_SIGN_STYLE = Manual")
          PYEOF
          echo "=== AFTER PATCH ==="
          grep -n "CODE_SIGN_STYLE" "$PBXPROJ" || echo "(not found)"
    - eas/run_fastlane
