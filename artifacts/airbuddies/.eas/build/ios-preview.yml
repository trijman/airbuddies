build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove lockfile and workspace config
        command: |
          rm -f ../../pnpm-lock.yaml || true
          rm -f ../../pnpm-workspace.yaml || true
    - run:
        name: Strip expo-dev-client
        command: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.dependencies['expo-dev-client'];fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild install
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Diagnose EAS credential environment
        command: |
          echo "=== env vars (keys only) ==="
          env | grep -iE '(cert|p12|sign|apple|expo_apple|eas|keychain|fastlane|provision|distribution|identity)' | sed 's/=.*/=<hidden>/' | sort
          echo ""
          echo "=== ~/.fastlane/ ==="
          ls -la ~/.fastlane/ 2>&1 || echo "(not found)"
          echo ""
          echo "=== /tmp cert-related files ==="
          ls /tmp/*.p12 /tmp/*.cer /tmp/*.pem /tmp/*.mobileprovision 2>&1 || echo "(none)"
          echo ""
          echo "=== security list-keychains ==="
          security list-keychains 2>&1
          echo ""
          echo "=== security find-identity ==="
          security find-identity -v -p codesigning 2>&1 || true
          echo ""
          echo "=== Provisioning Profiles dir ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>&1 || echo "(empty/not found)"
    - run:
        name: Patch pbxproj - install profile + set distribution signing
        command: python3 .eas/build/patch_signing.py
    - eas/run_fastlane
