build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove lockfile
        command: rm -f ../../pnpm-lock.yaml || true
    - run:
        name: Strip expo-dev-client
        command: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.dependencies['expo-dev-client'];fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild install
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Install signing credentials (bypass eas/run_fastlane)
        command: |
          set -e
          P12_B64="${EAS_BUILD_IOS_CREDENTIALS_DISTRIBUTION_CERTIFICATE_P12_BASE64:-}"
          P12_PASS="${EAS_BUILD_IOS_CREDENTIALS_DISTRIBUTION_CERTIFICATE_PASSWORD:-}"
          PROF_B64="${EAS_BUILD_IOS_CREDENTIALS_PROVISIONING_PROFILE_BASE64:-}"
          if [ -z "$P12_B64" ]; then
            echo "EAS remote credential vars not found. All EAS_BUILD vars present:"
            env | grep '^EAS_BUILD' | sed 's/=.*/=<hidden>/' || echo "(none)"
            exit 1
          fi
          echo "=== Installing distribution certificate ==="
          echo "$P12_B64" | base64 -d > /tmp/dist.p12
          security create-keychain -p "buildsecret" build.keychain 2>/dev/null || true
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "buildsecret" build.keychain
          security import /tmp/dist.p12 -k build.keychain -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "buildsecret" build.keychain
          echo "Installed identities:"
          security find-identity -v -p codesigning build.keychain
          echo "=== Installing provisioning profile ==="
          echo "$PROF_B64" | base64 -d > /tmp/adhoc.mobileprovision
          PROFILE_UUID=$(python3 -c "import plistlib; data=open('/tmp/adhoc.mobileprovision','rb').read(); start=data.find(b'<?xml'); end=data.find(b'</plist>')+8; pl=plistlib.loads(data[start:end]); print(pl['UUID'])")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/adhoc.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "Profile UUID: $PROFILE_UUID"
          echo "$PROFILE_UUID" > /tmp/profile_uuid.txt
    - run:
        name: Archive app
        command: |
          set -e
          PROFILE_UUID=$(cat /tmp/profile_uuid.txt)
          echo "Building with profile: $PROFILE_UUID"
          xcodebuild \
            -workspace ios/Airbuddies.xcworkspace \
            -scheme Airbuddies \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/Airbuddies.xcarchive \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            DEVELOPMENT_TEAM=72CS7BMND3 \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_UUID" \
            -allowProvisioningUpdates \
            archive
    - run:
        name: Export IPA
        command: |
          set -e
          PROFILE_UUID=$(cat /tmp/profile_uuid.txt)
          python3 -c "
          import plistlib
          opts = {'method': 'ad-hoc', 'teamID': '72CS7BMND3', 'provisioningProfiles': {'com.airbuddies.app': '${PROFILE_UUID}'}}
          with open('/tmp/ExportOptions.plist', 'wb') as f: plistlib.dump(opts, f)
          "
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Airbuddies.xcarchive \
            -exportPath /tmp/ipa_out \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates
          cp /tmp/ipa_out/Airbuddies.ipa ios/Airbuddies.ipa
          echo "IPA ready:"
          ls -la ios/Airbuddies.ipa
