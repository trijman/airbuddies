build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: rm -f ../../pnpm-lock.yaml && echo "Deleted" || true
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Install signing credentials
        command: |
          set -euo pipefail

          echo "=== Checking for credentials ==="
          if [ -z "${DIST_P12_BASE64:-}" ]; then
            echo "ERROR: DIST_P12_BASE64 secret not set."
            echo ""
            echo "To fix this, run on your Mac:"
            echo "  cd artifacts/airbuddies"
            echo "  eas credentials -p ios"
            echo "Select 'preview', then 'Set up Ad Hoc provisioning'."
            echo ""
            echo "OR: export your certificate from Keychain Access as .p12 and"
            echo "add the following EAS secrets at expo.dev → airbuddies → Settings → Secrets:"
            echo "  DIST_P12_BASE64   (base64 of your .p12 file)"
            echo "  DIST_P12_PASSWORD (password you set when exporting)"
            echo "  ADHOC_PROFILE_BASE64 (base64 of your .mobileprovision file)"
            exit 1
          fi

          echo "=== Decoding certificate ==="
          echo "$DIST_P12_BASE64" | base64 --decode > /tmp/dist_cert.p12

          echo "=== Creating build keychain ==="
          security create-keychain -p "buildsecret" build.keychain
          security list-keychains -s build.keychain login.keychain System.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "buildsecret" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "=== Importing certificate ==="
          security import /tmp/dist_cert.p12 \
            -k build.keychain \
            -P "${DIST_P12_PASSWORD:-}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "buildsecret" build.keychain

          echo "=== Installed identities ==="
          security find-identity -v -p codesigning build.keychain

          echo "=== Installing provisioning profile ==="
          echo "$ADHOC_PROFILE_BASE64" | base64 --decode > /tmp/adhoc.mobileprovision
          PROFILE_UUID=$(python3 << 'PYEOF'
          import plistlib, sys
          with open('/tmp/adhoc.mobileprovision', 'rb') as f:
              data = f.read()
          start = data.find(b'<?xml')
          end = data.find(b'</plist>') + 8
          pl = plistlib.loads(data[start:end])
          print(pl['UUID'])
          PYEOF
          )
          echo "Profile UUID: $PROFILE_UUID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp /tmp/adhoc.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Profile installed at ~/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "=== Patching pbxproj for Manual signing with this profile ==="
          PBXPROJ="ios/Airbuddies.xcodeproj/project.pbxproj"
          CERT_NAME=$(security find-identity -v -p codesigning build.keychain | grep "iPhone Distribution\|Apple Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Certificate name: $CERT_NAME"

          # Set Automatic=false, use Distribution identity
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' "$PBXPROJ"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "iPhone Distribution"/g' "$PBXPROJ"

          echo "=== pbxproj signing settings ==="
          grep "CODE_SIGN_STYLE\|CODE_SIGN_IDENTITY\|DEVELOPMENT_TEAM\|PROVISIONING" "$PBXPROJ" | head -10
    - run:
        name: Build IPA with gym
        command: |
          cd ios
          fastlane gym \
            --workspace Airbuddies.xcworkspace \
            --scheme Airbuddies \
            --configuration Release \
            --output_directory . \
            --output_name Airbuddies \
            --export_method ad-hoc \
            --destination "generic/platform=iOS" \
            --skip_profile_detection false
    - eas/upload_artifact:
        name: Upload IPA
        type: build
        path: ios/Airbuddies.ipa
