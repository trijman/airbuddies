build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: |
          echo "=== PWD: $PWD ==="
          find . -maxdepth 5 -name "pnpm-lock.yaml" 2>/dev/null || echo "none found"
          find . -maxdepth 5 -name "pnpm-lock.yaml" -delete 2>/dev/null || true
          echo "=== Lockfile removed ==="
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild
        command: |
          cd artifacts/airbuddies
          pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          find . -maxdepth 5 -name "pnpm-lock.yaml" -delete 2>/dev/null || true
          pnpm install --no-frozen-lockfile
    - eas/install_pods
    - eas/run_fastlane
