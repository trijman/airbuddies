build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: |
          echo "=== PWD: $PWD ==="
          rm -f ../../pnpm-lock.yaml && echo "Deleted ../../pnpm-lock.yaml" || echo "No lockfile found at ../../"
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - eas/run_fastlane
    - run:
        name: Show Xcode build errors
        when: always
        command: |
          LOG="$HOME/Library/Logs/gym/Airbuddies-Airbuddies.log"
          if [ -f "$LOG" ]; then
            echo "=== Xcode error/warning lines ==="
            grep -iE "(error:|warning:|FAILED|undefined|symbol|cannot|missing|clang|ld:)" "$LOG" | grep -v "note:" | head -100
            echo ""
            echo "=== Last 150 lines of gym log ==="
            tail -150 "$LOG"
          else
            echo "No gym log at $LOG"
            ls "$HOME/Library/Logs/gym/" 2>/dev/null || echo "No gym logs directory"
          fi
