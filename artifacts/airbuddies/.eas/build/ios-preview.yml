build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: |
          echo "=== PWD: $PWD ==="
          rm -f ../../pnpm-lock.yaml && echo "Deleted ../../pnpm-lock.yaml" || echo "No lockfile found"
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Create diagnostic Fastfile to inspect EAS signing setup
        command: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Fastfile << 'HEREDOC'
default_platform(:ios)
platform :ios do
  lane :default do
    puts "=== PROVISIONING PROFILES ==="
    sh("ls -la \"$HOME/Library/MobileDevice/Provisioning Profiles/\" 2>/dev/null || echo 'none installed'")
    puts "=== CODESIGNING IDENTITIES ==="
    sh("security find-identity -v -p codesigning 2>/dev/null || echo 'none'")
    puts "=== KEYCHAIN LIST ==="
    sh("security list-keychains 2>/dev/null || echo 'none'")
    puts "=== GEM LIST ==="
    sh("gem list 2>/dev/null | grep -iE '(expo|signing|match|cert|sigh)' || echo 'no relevant gems'")
    puts "=== ENV CREDENTIAL VARS ==="
    sh("env | grep -iE '(CERT|PROV|P12|PROFILE|SIGN|APPLE|TEAM|MATCH)' | sed 's/=.*/=[REDACTED]/' || echo 'none'")
    puts "=== DIAGNOSIS COMPLETE ==="
  end
end
HEREDOC
          echo "=== Diagnostic Fastfile created ==="
          cat ios/fastlane/Fastfile
    - eas/run_fastlane
