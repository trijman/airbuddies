build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove lockfile and workspace config
        command: |
          rm -f ../../pnpm-lock.yaml || true
          rm -f ../../pnpm-workspace.yaml || true
    - run:
        name: Strip expo-dev-client
        command: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.dependencies['expo-dev-client'];fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild install
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Patch pbxproj - install cert + profile + set distribution signing
        command: python3 .eas/build/patch_signing.py
    - run:
        name: Archive and export IPA
        command: |
          set -euo pipefail
          PROFILE_UUID="342d4c3b-313c-4394-bd51-ee3d245a490d"
          TEAM_ID="72CS7BMND3"
          BUNDLE_ID="com.airbuddies.app"
          ARCHIVE_PATH="/tmp/Airbuddies.xcarchive"
          EXPORT_DIR="$(pwd)/ios"
          KEYCHAIN_NAME="airbuddies-build.keychain-db"

          # Write ExportOptions.plist
          cat > /tmp/ExportOptions.plist << EXPORTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EXPORTEOF

          echo "=== ExportOptions.plist ===" && cat /tmp/ExportOptions.plist

          # Unlock our keychain before build
          security unlock-keychain -p "airbuddies-ci-build" "$KEYCHAIN_NAME" || true
          security set-keychain-settings -lut 7200 "$KEYCHAIN_NAME" || true

          # Archive
          echo "=== Starting xcodebuild archive ==="
          cd ios
          xcodebuild \
            -workspace Airbuddies.xcworkspace \
            -scheme Airbuddies \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME" \
            archive | xcpretty --color && echo "ARCHIVE_SUCCESS" || (echo "ARCHIVE_FAILED" && exit 1)

          # Export
          echo "=== Starting xcodebuild -exportArchive ==="
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME" \
            | xcpretty --color && echo "EXPORT_SUCCESS" || (echo "EXPORT_FAILED" && exit 1)

          echo "=== IPA files ==="
          ls -la "$EXPORT_DIR"/*.ipa || echo "No IPA found in $EXPORT_DIR"
          find /tmp -name "*.ipa" 2>/dev/null || true
