build:
  name: iOS Preview (no frozen lockfile)
  steps:
    - eas/checkout
    - eas/install_node_modules:
        inputs:
          install_command: pnpm install --no-frozen-lockfile
    - eas/prebuild:
        inputs:
          clean: true
    - run:
        name: Re-sync lockfile after prebuild modifications
        command: pnpm install --no-frozen-lockfile
    - eas/install_pods
    - eas/run_fastlane
