build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: |
          echo "=== PWD: $PWD ==="
          rm -f ../../pnpm-lock.yaml && echo "Deleted ../../pnpm-lock.yaml" || echo "No lockfile found at ../../"
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - run:
        name: Set DEVELOPMENT_TEAM in Xcode project
        command: |
          TEAM_ID="72CS7BMND3"
          PBXPROJ="ios/Airbuddies.xcodeproj/project.pbxproj"
          echo "=== Before fix ==="
          grep "DEVELOPMENT_TEAM" "$PBXPROJ" | head -8
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          echo "=== After fix ==="
          grep "DEVELOPMENT_TEAM" "$PBXPROJ" | head -8
    - run:
        name: Disable xcpretty for visible errors
        command: |
          mkdir -p ios/fastlane
          printf 'disable_xcpretty true\n' > ios/fastlane/Gymfile
          cat ios/fastlane/Gymfile
    - eas/run_fastlane
