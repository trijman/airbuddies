build:
  name: iOS Preview
  steps:
    - eas/checkout
    - run:
        name: Remove incompatible lockfile
        command: |
          echo "=== PWD: $PWD ==="
          rm -f ../../pnpm-lock.yaml && echo "Deleted ../../pnpm-lock.yaml" || echo "No lockfile found at ../../"
    - run:
        name: Install node modules
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Expo prebuild (includes pod install)
        command: pnpm exec expo prebuild --clean --platform ios
    - run:
        name: Post-prebuild sync
        command: |
          rm -f ../../pnpm-lock.yaml || true
          pnpm install --no-frozen-lockfile
    - eas/run_fastlane
    - run:
        name: Show Xcode build errors (always runs)
        always_run: true
        command: |
          LOG="$HOME/Library/Logs/gym/Airbuddies-Airbuddies.log"
          if [ -f "$LOG" ]; then
            echo "=== Xcode error lines ==="
            grep -E "(error:|ARCHIVE FAILED|CompileC|Ld |SWIFT_ERROR|clang: error|ld: error|undefined symbol|duplicate symbol|missing|cannot)" "$LOG" | head -80
            echo "=== Last 100 lines of gym log ==="
            tail -100 "$LOG"
          else
            echo "No gym log at $LOG"
            ls ~/Library/Logs/gym/ 2>/dev/null || echo "No gym logs at all"
          fi
