build:
  name: iOS Preview (no frozen lockfile)
  steps:
    - eas/checkout
    - run:
        name: Remove Replit-format lockfile
        command: rm -f pnpm-lock.yaml
    - eas/install_node_modules:
        inputs:
          install_command: pnpm install --no-frozen-lockfile
    - eas/prebuild:
        inputs:
          clean: true
    - run:
        name: Re-sync after prebuild
        command: rm -f pnpm-lock.yaml && pnpm install --no-frozen-lockfile
    - eas/install_pods
    - eas/run_fastlane
